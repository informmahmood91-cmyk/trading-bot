services:
  - type: web
    name: trading-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: CHATGPT_KEY
        sync: false
      - key: GEMINI_KEY
        sync: false
      - key: FINNHUB_KEY
        sync: false
      - key: TWELVE_DATA_KEY
        sync: false
      - key: CHART_IMG_API_KEY
        sync: false
      - key: ENABLE_WEB_SEARCH
        value: "true"
      - key: AI_RISK_PROFILE
        value: "BALANCED"
      - key: MCS_THRESHOLD
        value: "15.0"
      - key: MAX_PAYLOAD_MB
        value: "10"
      - key: MAX_CACHE_ENTRIES
        value: "200"
      - key: OFF_SESSION_MAX_AGE_HOURS
        value: "12"
      - key: SL_ATR_MULTIPLIER
        value: "1.5"
      - key: TP_ATR_MULTIPLIER
        value: "2.5"
